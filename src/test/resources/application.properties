# Los tests corren contra H2 en memoria emulando Postgres: no dependen de
# una BD viva. Este archivo SOLO agrega/override propiedades (el
# application.yaml principal se sigue cargando; .properties gana empates).
spring.datasource.url=jdbc:h2:mem:game_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
