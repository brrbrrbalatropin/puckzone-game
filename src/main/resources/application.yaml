server:
  port: 8083

spring:
  application:
    name: puckzone-game
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # game_db: amigos y mensajes directos. En Azure la URL completa llega por
  # env var (con sslmode=require); en local apunta al Postgres nativo 5432.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/game_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    # Ver la nota extensa en puckzone-ranking. Aqui JPA solo sirve a lo social
    # (amigos, DMs, directorio), nunca al game loop, asi que 5 sobran; cada
    # shard es una app aparte y por tanto un pool aparte contra el mismo B1ms.
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:5}
      minimum-idle: ${DB_POOL_IDLE:2}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        # prometheus: métricas para el Prometheus interno del environment
        # (la app es interna: el endpoint no es alcanzable desde internet).
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

puckzone:
  jwt:
    secret: ${PUCKZONE_JWT_SECRET:puckzone-dev-secret-change-me-please-32bytes-min!!}

  # Reporte de resultados al terminar cada partida (game -> ranking).
  ranking-report:
    base-url: ${RANKING_BASE_URL:http://localhost:8084}

  websocket:
    allowed-origins: http://localhost:5173,http://localhost:8080

  game:
    # Qué shard es esta instancia (puckzone-game=0, puckzone-game-1=1, ...).
    shard-id: ${PUCKZONE_SHARD_ID:0}
    board-width: 800
    board-height: 500
    goals-to-win: 7
    tick-rate: 60          # ticks de física por segundo
    goal-width: 200        # ancho de la portería, centrada en cada extremo
    puck-radius: 15
    paddle-radius: 30
    max-puck-speed: 900    # px/s, tope para que el disco no se vuelva injugable
    serve-speed: 300       # px/s con los que sale el disco en cada saque

    # Bot adaptativo: tres anclas (1, 4 y 9) y el resto se interpola.
    # El NIVEL 4 es el bot clásico que solo sigue el disco (~220 px/s),
    # el que validaron los primeros jugadores: rival de la banda 1200-1349.
    bot:
      default-level: 4             # cuando no llega rating (equivale a ELO 1200)
      level1-speed: 120            # px/s de la paleta
      level4-speed: 220
      level9-speed: 550
      level1-reaction-millis: 350  # cada cuánto "mira" el disco
      level4-reaction-millis: 80
      level9-reaction-millis: 30
      level1-aim-error-px: 45      # σ del ruido de puntería
      level4-aim-error-px: 6
      level9-aim-error-px: 3
